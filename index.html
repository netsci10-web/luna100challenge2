<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>달 지형 대사전</title>
    <!-- Leaflet CSS for 2D Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Cesium CSS for 3D Globe (안정적인 버전 1.95.0 사용) -->
    <link href="https://unpkg.com/cesium@1.95.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        
        /* Top Navigation Bar */
        #top-bar {
            width: 100%;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }
        
        .top-left-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-right-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #top-bar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.025em;
        }
        #top-bar p {
            margin: 0;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* 2D/3D Toggle Switch */
        .map-toggle {
            display: flex;
            background: #0f172a;
            border-radius: 8px;
            padding: 4px;
            border: 1px solid #334155;
        }
        .map-toggle button {
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .map-toggle button.active {
            background: #2563eb;
            color: white;
        }

        #main-content { display: flex; width: 100%; flex: 1; overflow: hidden; }
        
        #map-container { flex: 1; height: 100%; position: relative; }
        #leaflet-map { width: 100%; height: 100%; background-color: #000; position: absolute; top: 0; left: 0; z-index: 10; }
        #cesium-container { width: 100%; height: 100%; background-color: #000; position: absolute; top: 0; left: 0; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        
        /* When 3D is active */
        body.is-3d #cesium-container { z-index: 15; opacity: 1; pointer-events: auto; }
        body.is-3d #leaflet-map { opacity: 0; pointer-events: none; }
        
        #sidebar { 
            width: 420px; 
            height: 100%; 
            background: #0f172a; 
            box-shadow: -4px 0 20px rgba(0,0,0,0.7); 
            display: flex; 
            flex-direction: column; 
            z-index: 1000;
        }
        
        /* Search Box Styles */
        .search-box {
            padding: 16px;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #f8fafc;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #3b82f6; }
        .search-box button {
            padding: 8px 16px;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: #1d4ed8; }

        .category-nav {
            display: flex;
            flex-wrap: wrap;
            padding: 10px 16px;
            gap: 6px;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
        }
        .nav-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            border-radius: 6px;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .nav-btn.home-btn {
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: #334155; color: #f8fafc; }
        .nav-btn.active { 
            background: #2563eb; 
            color: #ffffff; 
            font-weight: 600; 
            border-color: #3b82f6;
        }

        /* Sort Controls Styles */
        .sort-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 16px 10px;
            gap: 8px;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
        }
        .sort-label { font-size: 0.75rem; color: #64748b; }
        .sort-select {
            background: #1e293b; color: #e2e8f0; border: 1px solid #334155; 
            border-radius: 4px; font-size: 0.75rem; padding: 4px 8px; outline: none;
            cursor: pointer;
        }

        #feature-list { flex: 1; overflow-y: auto; padding: 5px 0; }
        #feature-list::-webkit-scrollbar { width: 5px; }
        #feature-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .feature-item { 
            padding: 12px 20px; 
            border-bottom: 1px solid #1e293b; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        .feature-item:hover { background-color: #1e293b; }
        .feature-item.active { background-color: #1e293b; border-left: 4px solid #3b82f6; }
        
        .feature-id { font-size: 0.7rem; font-weight: 700; color: #3b82f6; margin-bottom: 2px; display: block; }
        .feature-name { font-weight: 600; color: #f1f5f9; margin-bottom: 2px; font-size: 0.95rem; }
        .feature-desc { font-size: 0.8rem; color: #64748b; line-height: 1.4; }
        
        #loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { opacity: 0; pointer-events: none; }

        @media (max-width: 768px) {
            #main-content { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; }
            #map-container { height: 50vh; }
            #top-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
            .top-right-group { width: 100%; justify-content: flex-end; }
        }
        
        /* Hide Cesium default UI elements */
        .cesium-viewer-bottom, .cesium-viewer-toolbar, .cesium-viewer-animationContainer, .cesium-viewer-timelineContainer { display: none !important; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="top-left-group">
            <h1>달 지형 대사전</h1>
        </div>
        <div class="top-right-group">
            <p class="hidden md:block">NASA LRO 데이터 기반 달 표면 탐사 및 루나 100 목록</p>
            <!-- 2D/3D Toggle Switch -->
            <div class="map-toggle">
                <button id="btn-2d" class="active">2D 평면</button>
                <button id="btn-3d">3D 지구본</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="map-container">
            <div id="leaflet-map"></div>
            <div id="cesium-container"></div>
            <div id="loading">
                <div class="spinner"></div>
                <div class="text-sm tracking-widest text-slate-400 font-bold">NASA LRO DATA LOADING...</div>
            </div>
        </div>
        
        <div id="sidebar">
            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="지형 이름 검색 (예: 코페르니쿠스, 바다)">
                <button id="search-btn">찾기</button>
            </div>
            
            <div class="category-nav" id="nav" style="border-bottom: none;">
                <!-- Home Button -->
                <button id="btn-home" class="nav-btn home-btn" title="지도 및 설정 초기화">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
                <div class="nav-btn active" data-type="all">전체</div>
                <div class="nav-btn" data-type="sea">달의 바다</div>
                <div class="nav-btn" data-type="mountain">산맥/단층</div>
                <div class="nav-btn" data-type="crater">충돌구</div>
                <div class="nav-btn" data-type="volcanic">화산 지형</div>
                <div class="nav-btn" data-type="luna100">루나 100</div>
            </div>

            <!-- Sort Controls -->
            <div class="sort-controls" id="sort-controls">
                <span class="sort-label">정렬 기준:</span>
                <select class="sort-select" id="sort-select">
                    <option value="type" selected>분류순</option>
                    <option value="name">이름순</option>
                </select>
            </div>

            <div id="feature-list"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- CesiumJS Web Worker 설정을 위한 Base URL 명시적 지정 -->
    <script>
        window.CESIUM_BASE_URL = 'https://unpkg.com/cesium@1.95.0/Build/Cesium/';
    </script>
    <script src="https://unpkg.com/cesium@1.95.0/Build/Cesium/Cesium.js"></script>

            { id: 'V26', lunaId: 'L68', name: '플램스티드 P (Flamsteed P)', lat: -3.0, lng: -44.0, diam: 112, types: ['volcanic', 'luna100'], desc: '서베이어 1호가 착륙한 거대한 고리형 화산 잔해.' },
            { id: 'V27', lunaId: 'L71', name: '술피키우스 갈루스 흑점', lat: 19.6, lng: 11.6, diam: 12, types: ['volcanic', 'luna100'], desc: '아폴로 17호가 오렌지색 흙을 발견한 화산재 분출 지대.' },
            { id: 'V28', lunaId: 'L72', name: '아틀라스 어두운 반점', lat: 46.7, lng: 44.4, diam: 87, types: ['volcanic', 'luna100'], desc: '크레이터 바닥에서 화산 가스가 폭발하며 만든 흔적.' },
            { id: 'V29', lunaId: 'L77', name: '시르살리스 계곡 (Rimae Sirsalis)', lat: -15.7, lng: -61.7, diam: 425, types: ['volcanic', 'luna100'], desc: '동쪽의 바다 분지에서 방사형으로 뻗어 나온 거대 계곡.' },
            { id: 'V30', lunaId: 'L79', name: '열기의 만 어두운 멘틀', lat: 12.0, lng: -3.5, diam: 90, types: ['volcanic', 'luna100'], desc: '화산재로 덮여 극도로 어둡게 보이는 퇴적 지역.' },
            { id: 'V31', lunaId: 'L86', name: '프린츠 계곡 (Rimae Prinz)', lat: 27.0, lng: -43.0, diam: 46, types: ['volcanic', 'luna100'], desc: '프린츠 크레이터 인근의 복잡한 구불구불한 계곡 시스템.' },
            { id: 'V32', lunaId: 'L89', name: '발렌타인 돔 (Valentine Dome)', lat: 30.5, lng: 10.1, diam: 30, types: ['volcanic', 'luna100'], desc: '심장 모양을 닮은 거대한 화산 돔.' },
            { id: 'V33', lunaId: 'L91', name: '데 가스파리스 계곡 (Rimae de Gasparis)', lat: -25.9, lng: -50.7, diam: 30, types: ['volcanic', 'luna100'], desc: '수많은 단층과 계곡들이 복잡하게 교차하는 지역.' },
            { id: 'V34', lunaId: 'L92', name: '길덴 계곡 (Vallis Gylden)', lat: -5.1, lng: 0.7, diam: 47, types: ['volcanic', 'luna100'], desc: '비의 바다 충돌 여파로 생성된 방사형 지형의 일부분.' },
            { id: 'V35', lunaId: 'L97', name: '잉기라미 계곡 (Vallis Inghirami)', lat: -44.0, lng: -73.0, diam: 140, types: ['volcanic', 'luna100'], desc: '동쪽의 바다 분지 형성 시 날아간 분출물에 의해 파인 거대 계곡.' },
            { id: 'V36', lunaId: 'L98', name: '비의 바다 용암류', lat: 32.8, lng: -22.0, diam: 100, types: ['volcanic', 'luna100'], desc: '비의 바다 내부에서 용암이 여러 겹으로 흐르며 만들어낸 뚜렷한 경계 무늬.' },
            { id: 'V37', lunaId: 'L99', name: '이나 (Ina)', lat: 18.6, lng: 5.3, diam: 3, types: ['volcanic', 'luna100'], desc: '형성된 지 얼마 되지 않은(젊은) D자 모양의 화산 가스 방출 구덩이(칼데라).' },
            
            // --- 루나 100 단독 (분류 지정 애매한 항목들) ---
            { id: 'L1', lunaId: 'L1', name: '달 (Moon)', lat: 0, lng: 0, diam: 3476, types: ['luna100'], desc: '지구의 하나뿐인 거대한 위성.' },
            { id: 'L2', lunaId: 'L2', name: '지구조 (Earthshine)', lat: 0, lng: 0, diam: 3476, types: ['luna100'], desc: '지구에 반사된 햇빛이 비추는 달의 어두운 부분.' },
            { id: 'L3', lunaId: 'L3', name: '바다/고지대 경계', lat: -10, lng: 10, diam: 1000, types: ['luna100'], desc: '어두운 바다와 밝은 고지대의 뚜렷한 대비.' },
            { id: 'L41', lunaId: 'L41', name: '베셀 광조', lat: 21.8, lng: 17.9, diam: 50, types: ['luna100'], desc: '맑은 바다를 가로지르는 길고 불확실한 기원의 광조.' },
            { id: 'L59', lunaId: 'L59', name: '쉴러-주키우스 분지', lat: -56.0, lng: -45.0, diam: 335, types: ['luna100'], desc: '심하게 침식되어 알아보기 힘든 거대한 고리 분지.' },
            { id: 'L63', lunaId: 'L63', name: '비의 바다 조각 (Imbrium sculpture)', lat: 11.0, lng: 12.0, diam: 150, types: ['luna100'], desc: '비의 바다 충돌 시 날아간 파편이 방사형으로 깎아낸 지형.' }
        ];

        let map2D;
        let map3D;
        let is3D = false;
        let currentType = 'all'; // 초기 탭
        let searchQuery = '';
        let currentSort = 'type'; // 초기 정렬 상태 (분류순 최우선)

        function initMap() {
            // --- 2D Map Initialization (Leaflet) ---
            const nasaTrekUrl = 'https://trek.nasa.gov/tiles/Moon/EQ/LRO_WAC_Mosaic_Global_303ppd_v02/1.0.0/default/default028mm/{z}/{y}/{x}.jpg';

            map2D = L.map('leaflet-map', {
                center: [0, 0],
                zoom: 2,
                minZoom: 1,
                maxZoom: 7,
                crs: L.CRS.EPSG4326,
                zoomSnap: 0.1,
                zoomDelta: 0.5
            });

            L.tileLayer(nasaTrekUrl, {
                attribution: 'Map data &copy; NASA Moon Trek',
                noWrap: true,
                tms: false,
                maxZoom: 7
            }).addTo(map2D);

            L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map2D);

            map2D.on('load', () => document.getElementById('loading').classList.add('hidden'));
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);

            // --- 3D Globe Initialization (Cesium) ---
            try {
                // 달 전용 지형(Terrain)을 사용하여 불필요한 Web Worker 호출 방지
                const moonTerrain = new Cesium.EllipsoidTerrainProvider({
                    ellipsoid: Cesium.Ellipsoid.MOON
                });

                map3D = new Cesium.Viewer('cesium-container', {
                    animation: false,
                    baseLayerPicker: false,
                    fullscreenButton: false,
                    geocoder: false,
                    homeButton: false,
                    infoBox: false,
                    sceneModePicker: false,
                    selectionIndicator: false,
                    timeline: false,
                    navigationHelpButton: false,
                    navigationInstructionsInitiallyVisible: false,
                    mapProjection: new Cesium.GeographicProjection(Cesium.Ellipsoid.MOON),
                    globe: new Cesium.Globe(Cesium.Ellipsoid.MOON),
                    terrainProvider: moonTerrain,
                    imageryProvider: new Cesium.UrlTemplateImageryProvider({
                        url: 'https://trek.nasa.gov/tiles/Moon/EQ/LRO_WAC_Mosaic_Global_303ppd_v02/1.0.0/default/default028mm/{z}/{y}/{x}.jpg',
                        tms: false,
                        maximumLevel: 7,
                        tilingScheme: new Cesium.GeographicTilingScheme({
                            ellipsoid: Cesium.Ellipsoid.MOON
                        })
                    })
                });
                
                map3D.scene.skyBox.show = false;
                map3D.scene.backgroundColor = Cesium.Color.BLACK;
                map3D.scene.sun.show = false;
                map3D.scene.moon.show = false; 
            } catch (e) {
                console.warn("Cesium 3D initialization failed, fallback to 2D only.", e);
            }

            setupToggle();
            setupNav();
            setupSearch();
            setupSort();
            renderList();
        }

        function setupToggle() {
            const btn2D = document.getElementById('btn-2d');
            const btn3D = document.getElementById('btn-3d');
            const body = document.body;

            btn2D.addEventListener('click', () => {
                if (!is3D) return;
                is3D = false;
                btn2D.classList.add('active');
                btn3D.classList.remove('active');
                body.classList.remove('is-3d');
                
                if (map3D) {
                    const center = getCesiumCenter();
                    if (center) {
                        map2D.setView([center.lat, center.lng], center.zoom, { animate: false });
                    }
                }
            });

            btn3D.addEventListener('click', () => {
                if (is3D) return;
                is3D = true;
                btn3D.classList.add('active');
                btn2D.classList.remove('active');
                body.classList.add('is-3d');

                if (map3D) {
                    const center = map2D.getCenter();
                    const zoom = map2D.getZoom();
                    // 애니메이션 없이 즉각적으로 시점을 맞춰 카메라 오동작 방지
                    flyTo3D(center.lat, center.lng, zoom, true); 
                }
            });
        }
        
        function getCesiumCenter() {
            if (!map3D) return null;
            const windowPosition = new Cesium.Cartesian2(map3D.canvas.clientWidth / 2, map3D.canvas.clientHeight / 2);
            const pickRay = map3D.camera.getPickRay(windowPosition);
            const globe = map3D.scene.globe;
            const pickPosition = globe.pick(pickRay, map3D.scene);
            
            let lat = 0, lng = 0;
            if (pickPosition) {
                const cartographic = globe.ellipsoid.cartesianToCartographic(pickPosition);
                lat = Cesium.Math.toDegrees(cartographic.latitude);
                lng = Cesium.Math.toDegrees(cartographic.longitude);
            } else {
                // pickPosition이 안 잡힐 경우(줌아웃 상태 등) 카메라 중심 좌표를 폴백으로 사용
                const cartographic = map3D.camera.positionCartographic;
                lat = Cesium.Math.toDegrees(cartographic.latitude);
                lng = Cesium.Math.toDegrees(cartographic.longitude);
            }

            const height = map3D.camera.positionCartographic.height;
            const zoom = Math.max(1.8, 10 - Math.log2(height / 10000));
            
            return { lat, lng, zoom };
        }

        // instant=true 일 때는 애니메이션 없이 즉각적으로 시점을 맞춤
        function flyTo3D(lat, lng, zoomLevel, instant = false) {
            if (!map3D) return;
            
            const height = 10000 * Math.pow(2, 10 - zoomLevel);
            const destination = Cesium.Cartesian3.fromDegrees(lng, lat, height, Cesium.Ellipsoid.MOON);
            const orientation = {
                heading: 0.0,
                pitch: Cesium.Math.toRadians(-90.0), // 항상 똑바로 아래를 내려다보도록 강제 지정
                roll: 0.0
            };

            if (instant) {
                map3D.camera.setView({ destination, orientation });
            } else {
                map3D.camera.flyTo({
                    destination,
                    orientation,
                    duration: 1.5
                });
            }
        }

        function setupSort() {
            const sortSelect = document.getElementById('sort-select');
            sortSelect.value = 'type';
            sortSelect.addEventListener('change', (e) => {
                currentSort = e.target.value;
                renderList();
            });
        }

        function setupNav() {
            // "홈" 버튼 로직 (모든 설정 초기화)
            const homeBtn = document.getElementById('btn-home');
            const btns = document.querySelectorAll('.nav-btn[data-type]');
            
            if (homeBtn) {
                homeBtn.addEventListener('click', () => {
                    // 상태 초기화
                    currentType = 'all';
                    searchQuery = '';
                    currentSort = 'type';
                    
                    // UI 인풋 및 선택박스 초기화
                    const searchInput = document.getElementById('search-input');
                    if (searchInput) searchInput.value = '';
                    
                    const sortSelect = document.getElementById('sort-select');
                    if (sortSelect) sortSelect.value = 'type';
                    
                    const sortControls = document.getElementById('sort-controls');
                    if (sortControls) sortControls.style.display = 'flex';

                    // 탭 버튼 UI 상태 갱신
                    btns.forEach(b => b.classList.remove('active'));
                    const allBtn = document.querySelector('.nav-btn[data-type="all"]');
                    if (allBtn) allBtn.classList.add('active');

                    // 리스트 렌더링
                    renderList();

                    // 지도 전체 보기로 부드럽게 초기화
                    if (is3D) {
                        flyTo3D(0, 0, 2);
                    } else {
                        map2D.flyTo([0, 0], 2, { animate: true, duration: 1.5 });
                    }
                });
            }

            // 일반 카테고리 탭 로직
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.getAttribute('data-type');
                    
                    searchQuery = '';
                    const searchInput = document.getElementById('search-input');
                    if(searchInput) searchInput.value = '';

                    if (currentType !== 'luna100') {
                        currentSort = 'type';
                        const sortSelect = document.getElementById('sort-select');
                        if(sortSelect) sortSelect.value = 'type';
                    }

                    const sortControls = document.getElementById('sort-controls');
                    if (currentType === 'luna100') {
                        sortControls.style.display = 'none';
                    } else {
                        sortControls.style.display = 'flex';
                    }

                    renderList();

                    if (is3D) {
                        flyTo3D(0, 0, 2);
                    } else {
                        map2D.flyTo([0, 0], 2, { animate: true, duration: 1.5 });
                    }
                });
            });
        }

        function setupSearch() {
            const searchBtn = document.getElementById('search-btn');
            const searchInput = document.getElementById('search-input');

            if (!searchBtn || !searchInput) return;

            const performSearch = () => {
                searchQuery = searchInput.value.toLowerCase().trim();
                renderList();
            };

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') performSearch();
            });
        }

        function renderList() {
            const listContainer = document.getElementById('feature-list');
            listContainer.innerHTML = '';

            let filtered;
            if (currentType === 'luna100') {
                filtered = moonFeatures.filter(f => f.lunaId);
            } else if (currentType === 'all') {
                filtered = [...moonFeatures];
            } else {
                filtered = moonFeatures.filter(f => f.types.includes(currentType));
            }
            
            if (searchQuery) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(searchQuery));
            }

            if(currentType === 'luna100') {
                filtered.sort((a, b) => {
                    const numA = parseInt(a.lunaId.replace('L', '')) || 0;
                    const numB = parseInt(b.lunaId.replace('L', '')) || 0;
                    return numA - numB;
                });
            } else {
                if (currentSort === 'name') {
                    filtered.sort((a, b) => a.name.localeCompare(b.name));
                } else if (currentSort === 'type') {
                    filtered.sort((a, b) => {
                        const typeA = a.id.replace(/[0-9]/g, '');
                        const typeB = b.id.replace(/[0-9]/g, '');
                        if(typeA !== typeB) return typeA.localeCompare(typeB);
                        
                        const numA = parseInt(a.id.replace(/[^0-9]/g, '')) || 0;
                        const numB = parseInt(b.id.replace(/[^0-9]/g, '')) || 0;
                        return numA - numB;
                    });
                }
            }

            if (filtered.length === 0) {
                listContainer.innerHTML = '<div style="padding: 20px; color: #94a3b8; text-align: center;">검색 결과가 없습니다.</div>';
                return;
            }

            filtered.forEach(feature => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.id = `item-${feature.id}`;
                
                let displayId = '';
                if (currentType === 'luna100') {
                    displayId = feature.lunaId;
                } else {
                    displayId = feature.id;
                    if (feature.lunaId && feature.id !== feature.lunaId) {
                        displayId += ` / ${feature.lunaId}`;
                    }
                }
                
                item.innerHTML = `
                    <span class="feature-id">${displayId}</span>
                    <div class="feature-name">${feature.name}</div>
                    <div class="feature-desc">${feature.desc}</div>
                `;

                item.addEventListener('click', () => selectFeature(feature));
                listContainer.appendChild(item);
            });
        }

        function selectFeature(feature) {
            document.querySelectorAll('.feature-item').forEach(el => el.classList.remove('active'));
            const element = document.getElementById(`item-${feature.id}`);
            if (element) element.classList.add('active');

            let targetZoom = 5.0;
            if (feature.diam) {
                const calculatedZoom = 13.0 - Math.log2(feature.diam);
                targetZoom = Math.max(1.8, Math.min(calculatedZoom, 7.0));
            }

            if (is3D) {
                flyTo3D(feature.lat, feature.lng, targetZoom);
            } else {
                map2D.flyTo([feature.lat, feature.lng], targetZoom, {
                    animate: true,
                    duration: 1.5
                });
            }
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
